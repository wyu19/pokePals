<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PokePals</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Host sprite (main pet) -->
  <div id="host-container" style="position: absolute;">
    <img id="host-sprite" class="sprite" src="assets/sprites/bulbasaur/idle-1.png" alt="Pokemon" draggable="false">
  </div>
  
  <!-- Visitor sprites are created dynamically by renderer.js -->
  
  <!-- Add Friend Dialog -->
  <div id="add-friend-dialog" class="dialog-overlay" style="display: none;">
    <div class="dialog-content">
      <div class="dialog-header">
        <h2 class="dialog-title">Add Friend</h2>
        <button id="add-friend-close" class="dialog-close">&times;</button>
      </div>
      <div class="dialog-body">
        <input type="text" id="friend-search-input" class="search-input" placeholder="Search by username..." autocomplete="off">
        <div id="friend-search-results" class="search-results"></div>
      </div>
    </div>
  </div>
  
  <!-- Friend Requests Dialog -->
  <div id="friend-requests-dialog" class="dialog-overlay" style="display: none;">
    <div class="dialog-content">
      <div class="dialog-header">
        <h2 class="dialog-title">Friend Requests</h2>
        <button id="friend-requests-close" class="dialog-close">&times;</button>
      </div>
      <div class="dialog-body">
        <div id="friend-requests-list" class="requests-list"></div>
      </div>
    </div>
  </div>
  
  <script src="animation.js"></script>
  <script src="auth.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
